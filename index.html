<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryVault - Your Personal Digital Diary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 95vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            overflow: hidden;
            background-color: white;
        }
        
        /* Header Styles */
        .app-header {
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            font-size: 2.2rem;
        }
        
        .logo-text h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .logo-text p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .header-controls {
            display: flex;
            gap: 15px;
        }
        
        /* Button Styles */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background-color: #4a00e0;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #3800a8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background-color: #e0e0e0;
        }
        
        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background-color: #f9f9f9;
            padding: 25px 20px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-section {
            margin-bottom: 30px;
        }
        
        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background-color: #eef5ff;
            border-color: #4a00e0;
            color: #4a00e0;
        }
        
        /* Diary List */
        .diary-list {
            flex: 1;
            overflow-y: auto;
            max-height: 300px;
        }
        
        .diary-item {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            background-color: white;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .diary-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
        
        .diary-item.active {
            border-color: #4a00e0;
            background-color: #f0f7ff;
        }
        
        .diary-date {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }
        
        .diary-preview {
            font-size: 0.95rem;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Editor Area */
        .editor-container {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .editor-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            border: none;
            width: 70%;
            padding: 5px 0;
            background: transparent;
        }
        
        .editor-title:focus {
            outline: none;
            border-bottom: 2px solid #4a00e0;
        }
        
        .editor-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .editor-area {
            flex: 1;
            border: none;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 15px;
            resize: none;
            background-color: #fdfdfd;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        
        .editor-area:focus {
            outline: none;
            border-color: #c3cfe2;
            box-shadow: 0 0 0 2px rgba(106, 17, 203, 0.1);
        }
        
        .editor-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .mood-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .mood-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }
        
        .mood-btn:hover, .mood-btn.active {
            transform: scale(1.1);
            border-color: #4a00e0;
        }
        
        /* Stats Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #4a00e0;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }
        
        /* Footer */
        .app-footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            background-color: #f9f9f9;
        }
        
        /* Responsive Design */
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #eee;
            }
            
            .diary-list {
                max-height: 200px;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            .editor-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .editor-title {
                width: 100%;
            }
            
            .header-controls {
                width: 100%;
                justify-content: space-between;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-book-sparkles"></i>
                </div>
                <div class="logo-text">
                    <h1>MemoryVault</h1>
                    <p>Your personal digital diary - Secure, private, and beautiful</p>
                </div>
            </div>
            <div class="header-controls">
                <button class="btn btn-secondary" id="exportBtn">
                    <i class="fas fa-file-export"></i> Export
                </button>
                <button class="btn btn-primary" id="newEntryBtn">
                    <i class="fas fa-plus"></i> New Entry
                </button>
            </div>
        </header>
        
        <main class="main-content">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title"><i class="fas fa-filter"></i> Filter by</h3>
                    <button class="filter-btn active" data-filter="all">All Entries</button>
                    <button class="filter-btn" data-filter="today">Today</button>
                    <button class="filter-btn" data-filter="week">This Week</button>
                    <button class="filter-btn" data-filter="month">This Month</button>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title"><i class="fas fa-history"></i> Recent Entries</h3>
                    <div class="diary-list" id="diaryList">
                        <!-- Diary entries will be loaded here -->
                    </div>
                </div>
                
                <div class="sidebar-section stats-container">
                    <div class="stat-card">
                        <div class="stat-value" id="totalEntries">0</div>
                        <div class="stat-label">Total Entries</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="streakCount">0</div>
                        <div class="stat-label">Day Streak</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="monthEntries">0</div>
                        <div class="stat-label">This Month</div>
                    </div>
                </div>
            </aside>
            
            <section class="editor-container">
                <div class="editor-header">
                    <input type="text" class="editor-title" id="entryTitle" placeholder="Entry Title...">
                    <button class="btn btn-primary" id="saveEntryBtn">
                        <i class="fas fa-save"></i> Save Entry
                    </button>
                </div>
                
                <div class="editor-meta">
                    <div><i class="far fa-calendar"></i> <span id="currentDate">Loading date...</span></div>
                    <div><i class="far fa-clock"></i> <span id="currentTime">Loading time...</span></div>
                    <div><i class="fas fa-feather"></i> <span id="wordCount">0 words</span></div>
                </div>
                
                <textarea class="editor-area" id="entryContent" placeholder="Start writing your thoughts here..."></textarea>
                
                <div class="editor-footer">
                    <div class="mood-selector">
                        <span>Mood:</span>
                        <button class="mood-btn" data-mood="happy">😊</button>
                        <button class="mood-btn" data-mood="neutral">😐</button>
                        <button class="mood-btn" data-mood="sad">😔</button>
                        <button class="mood-btn" data-mood="excited">🤩</button>
                        <button class="mood-btn" data-mood="love">🥰</button>
                    </div>
                    
                    <button class="btn btn-secondary" id="deleteEntryBtn">
                        <i class="fas fa-trash"></i> Delete Entry
                    </button>
                </div>
            </section>
        </main>
        
        <footer class="app-footer">
            <p>MemoryVault &copy; 2023 | Your thoughts are encrypted and stored locally in your browser</p>
        </footer>
    </div>

        <link rel="stylesheet" href="memoryvault.css">
        <script src="memoryvault.js"></script>
</body>
</html>
